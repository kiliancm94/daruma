{% extends "base.html" %}
{% block title %}{% if skill %}Edit Skill{% else %}New Skill{% endif %} — Daruma{% endblock %}
{% block content %}
<h1>{% if skill %}Edit Skill{% else %}New Skill{% endif %}</h1>
<form method="post" action="/ui/skills{% if skill %}/{{ skill.id }}{% endif %}" class="card">
    <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" value="{{ skill.name if skill else '' }}" required>
    </div>
    <div class="form-group">
        <label for="description">Description</label>
        <input type="text" id="description" name="description" value="{{ skill.description if skill else '' }}">
    </div>
    <div class="form-group">
        <label for="content">Content <span class="text-dim">(markdown)</span></label>
        <textarea id="content" name="content" rows="12" required>{{ skill.content if skill else '' }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">{% if skill %}Save{% else %}Create{% endif %}</button>
    <a href="/ui/skills/" class="btn">Cancel</a>
</form>
{% endblock %}
